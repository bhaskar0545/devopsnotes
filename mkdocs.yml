site_name: My DevOps Notes
site_description: Personal DevOps and Kubernetes notes
site_url: https://bhaskar0545.github.io/devopsnotes/
repo_url: https://github.com/bhaskar0545/devopsnotes
repo_name: bhaskar0545/devopsnotes

theme:
  name: material
  language: en
  palette:
    scheme: default
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  font:
    text: Lato
    code: Roboto Mono

nav:
  - Home: index.md
  - ML Ops:
      - Refs: MLOps/Refs.md
  - Kubernetes:
      - Concepts: kubernetes/concepts.md
      - Pods: kubernetes/pods.md
      - Services: kubernetes/services.md
      - Deployments: kubernetes/deployments.md
      - Troubleshooting: troubleshooting.md
      - Cheatsheet: cheatsheets.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - fenced_code
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
