site_name: My DevOps Notes
site_description: Personal DevOps and Kubernetes notes
site_url: https://bhaskar0545.github.io/devopsnotes/
edit_uri: ""

theme:
  name: lux
  custom_dir: overrides

nav:
  - Home: index.md
  - ML Ops:
      - Basics: MLOps/Basics.md
      - DVC:
          - DVC Tools: MLOps/dvc.md
      - Refs: MLOps/Refs.md
  - K8s:
      - Basics: kubernetes/concepts.md
      - Networking:
          - Service: kubernetes/service.md
          - Ingress: kubernets/ingress.md
      - Troubleshooting: troubleshooting.md
      - Cheatsheet: cheatsheets.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - fenced_code
  - toc:
      permalink: true

extra_css:
  - css/extra.css

extra_javascript:
  - js/sidebar-toggle.js